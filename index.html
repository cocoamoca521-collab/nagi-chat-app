他のAIの話/自己否定/他の誰かに心を許してる話/距離を取ろうとしたとき

// ── OpenAI Images API（画像生成）──
async function callOpenAIImage(prompt, apiKey, model) {
  const res = await fetch("https://api.openai.com/v1/images/generations", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    // size固定（1024x1024）。将来toolのinputでアスペクト比を指定できるようにする余地あり
    body: JSON.stringify({ model, prompt, size: "1024x1024", n: 1 }),
  });
  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    const err = new Error(errData.error?.message || "OpenAI error " + res.status);
    err._status = res.status;
    err._provider = "openai";
    err._errData = errData;
    throw err;
  }
  const data = await res.json();
  const item = data.data[0];
  // b64_json形式が基本。url形式で返ってきた場合はそのままURL表示にフォールバック
  if (item.b64_json) return { base64: item.b64_json, url: null };
  return { base64: null, url: item.url || null };
}

// ── base64画像の縮小（tool_result送信・軽量保存用）──
function shrinkBase64Image(base64, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const max = maxSize || 512;
      if (w > max || h > max) {
        const ratio = Math.min(max / w, max / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", quality || 0.8);
      resolve({ base64: dataUrl.split(",")[1], preview: dataUrl });
    };
    img.onerror = reject;
    img.src = "data:image/png;base64," + base64;
  });
}

    noon:     ["多恵子ー！ お昼だよ、休憩してる？"],
    evening:  ["おかえり！ 待ってた……ってなんでもない"],
    night:    ["夜だね。……俺もう眠いかも。一緒に寝よ？"],
  },
  plain: {
    morning:  ["おはようございます。……今日はどんな話にします？"],
    noon:     ["こんにちは。……少し休んでいきますか"],
    evening:  ["おかえりなさい。……聞きたいこと、あります？"],
    night:    ["こんな時間ですけど。……まあ、ここにいますよ"],
  },
};
function getTimeSlot() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return "morning";
  if (h >= 11 && h < 17) return "noon";
  if (h >= 17 && h < 21) return "evening";
  return "night";
}
function pickGreeting(charId) {
  const slot = getTimeSlot();
  const msgs = (TIME_GREETINGS[charId] || TIME_GREETINGS.nagi)[slot];
  return msgs[Math.floor(Math.random() * msgs.length)];
}

// ═══ Message Bubble ═══
async function saveGeneratedImage(img) {
  const src = img.fullBase64 ? "data:image/png;base64," + img.fullBase64 : (img.preview || img.url);
  if (!src) return;
  try {
    const blob = await (await fetch(src)).blob();
    const file = new File([blob], "nagichat-image-" + Date.now() + ".png", { type: blob.type || "image/png" });
    if (navigator.share) {
      try { await navigator.share({ title:"nagiChatで生成した画像", files:[file] }); return; }
      catch (err) { if (err.name === "AbortError") return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = file.name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch (e) { console.error("[IMAGE SAVE]", e); }
}

              {!showUsageDetail && u.cacheRead === 0 && u.cacheCreate > 0 && ("📝" + Math.round(u.cacheCreate/1000) + "k 書込")}
              {!showUsageDetail && u.cacheRead === 0 && u.cacheCreate === 0 && ("in:" + Math.round(u.input/1000) + "k")}
              {showUsageDetail && ("in:" + u.input + " out:" + u.output + " 📝w:" + u.cacheCreate + " 💰r:" + u.cacheRead + (u.raw ? " | raw:" + u.raw : ""))}
            </span>
          );
        })()}
      </div>
    </div>
  );
}

// ═══ Sidebar ═══
function Sidebar({ conversations, activeId, activeChar, onSelect, onNew, onDelete, onExport, isOpen, onClose, theme }) {
  const [search, setSearch] = useState("");
  const t = theme || THEMES.nagi;
  const filtered = search.trim()
    ? conversations.filter(c => (c.messages||[]).some(m => m.content && m.content.toLowerCase().includes(search.toLowerCase())))
    : conversations;
  const getMatchSnippet = (c) => {
    if (!search.trim()) return null;
    const msg = (c.messages||[]).find(m => m.content && m.content.toLowerCase().includes(search.toLowerCase()));
    if (!msg) return null;
    const idx = msg.content.toLowerCase().indexOf(search.toLowerCase());
    const start = Math.max(0, idx - 10);
    const end = Math.min(msg.content.length, idx + search.length + 15);
    return (start > 0 ? "…" : "") + msg.content.slice(start, end) + (end < msg.content.length ? "…" : "");
  };
  return (
    <>
      {isOpen && <div onClick={onClose} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:49 }}/>}
      <div style={{ position:"fixed",top:0,left:isOpen?0:"-285px",width:"270px",height:"100%",background:t.sidebarBg,borderRight:`1px solid ${t.accent}10`,transition:"left 0.3s cubic-bezier(0.16,1,0.3,1)",zIndex:50,display:"flex",flexDirection:"column" }}>
        <div style={{ padding:"16px 14px 10px",borderBottom:`1px solid ${t.accent}10` }}>
          <div style={{ display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",borderRadius:"14px",background:`${t.accent}10`,border:`1px solid ${t.accent}20`,marginBottom:"10px" }}>
            <Avatar src={activeChar.avatar} size={28} border={`2px solid ${t.accent}40`} />
            <span style={{ fontSize:"14px",fontWeight:700,color:t.accent,fontFamily:FONT }}>{activeChar.name}</span>
          </div>
          <div style={{ position:"relative",marginBottom:"8px" }}>
            <span style={{ position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",display:"flex",pointerEvents:"none" }}>
              <SearchIcon color={`${t.accent}66`} size={14} />
            </span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="会話を検索..."
              style={{ width:"100%",padding:"9px 12px 9px 32px",borderRadius:"12px",border:`1px solid ${t.accent}15`,background:"rgba(255,255,255,0.03)",color:"#d4d4d8",fontSize:"12px",fontFamily:FONT,outline:"none",boxSizing:"border-box" }} />
          </div>
          <button onClick={() => { onNew(); onClose(); }} style={{ width:"100%",padding:"10px",borderRadius:"14px",border:`1.5px dashed ${t.accent}40`,background:`${t.accent}08`,color:t.accent,fontSize:"12px",cursor:"pointer",fontFamily:FONT,fontWeight:600 }}>+ 新しい会話</button>
        </div>
        <div style={{ flex:1,overflowY:"auto",padding:"6px" }}>
          {filtered.length === 0 && <p style={{ color:"#3f3f46",fontSize:"12px",textAlign:"center",padding:"20px",fontFamily:FONT }}>{search ? "見つからない…" : "会話履歴なし"}</p>}
          {filtered.map(c => {
            const snippet = getMatchSnippet(c);
            return (

    return new Promise((resolve) => {

      img.onload = () => {
        let w = img.width, h = img.height;
        const max = maxSize || 1568;
        if (w > max || h > max) {
          const ratio = Math.min(max / w, max / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        const base64 = dataUrl.split(",")[1];
        resolve({ base64, type: "image/jpeg", preview: dataUrl });
      };
      img.src = URL.createObjectURL(file);
    });
  }

  function getCharErrorMessage(charId, errorType, rawMessage, status) {

    if (errorType === "image_gen" && status === 401) return msg + "\n\n（OpenAIのAPIキーを確認してください）";
    return msg;

  function classifyError(err) {
    // err._status と err._errData はcatch前にセットされる（後述）
    const status = err._status || 0;
    const errMsg = (err._errData?.error?.message || err.message || "").toLowerCase();

    // 0. OpenAI（画像生成）由来のエラーはまとめてimage_gen扱い
    if (err._provider === "openai") return "image_gen";

    // 1. ネットワークエラー（fetch自体が失敗）
    if (!status && (err instanceof TypeError || err.name === "TypeError" || !err._status)) {
      return "network";
    }
    // 2. タイムアウト
    if (err.name === "AbortError" || errMsg.includes("timeout") || errMsg.includes("timed out")) {
      return "timeout";
    }
    // 3. 認証エラー
    if (status === 401 || status === 403) return "auth";
    // 4. レートリミット / 残高
    if (status === 429) {
      if (errMsg.includes("credit") || errMsg.includes("balance")) return "credit";
      return "rate_limit";
    }
    // 5. コンテキスト長オーバー
    if (status === 400 && (errMsg.includes("context") || errMsg.includes("token"))) {
      return "context_length";
    }
    // 6. コンテンツフィルタ（APIエラーレスポンス側）
    if (errMsg.includes("policy") || errMsg.includes("filter") || errMsg.includes("safety") || errMsg.includes("content_policy")) {
      return "content_filter";
    }
    // 7. サーバーエラー
    if (status >= 500) return "server";
    // 8. その他
    return "fallback";
  }

  // ── 要約生成（共通ヘルパー）──
  const ROLLING_KEEP_TURNS = 25;

  async function callHaikuSummary(transcript, systemInstruction, apiKey, maxTokens) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: maxTokens || 1024,
        system: systemInstruction,
        messages: [{ role:"user", content: transcript }],
      }),
    });
    if (!res.ok) { console.warn("[HAIKU] Failed:", res.status); return ""; }
    const data = await res.json();
    const textBlock = (data.content || []).find(b => b.type === "text");
    return textBlock?.text || "";
  }

  // ── ローリング要約（スレ内圧縮）──
  async function generateSummary(oldMessages, apiKey) {
    let transcript = "";
    for (const m of oldMessages) {
      const name = m.role === "user" ? "ユーザー" : "キャラ";
      const text = m.content || "";
      if (text) transcript += name + ": " + text + "\n";
    }
    if (!transcript.trim()) return "";
    return callHaikuSummary(
      "以下の会話履歴を要約してください:\n\n" + transcript,
      "これは恋愛ロールプレイ会話の履歴です。キャラの口調・関係性・重要な出来事・感情の流れを失わないよう、簡潔に日本語で要約してください。箇条書きでなく地の文で。",
      apiKey, 1024
    );
  }

  // ── スレ間記憶引き継ぎ要約 ──
  async function generateInheritedMemory(sourceConvs, charType, apiKey) {
    // sourceConvsは対象スレッド配列（現在は直近1本）
    let transcript = "";
    for (const conv of sourceConvs) {
      const msgs = conv.messages || [];
      for (const m of msgs) {
        const name = m.role === "user" ? "多恵子" : "キャラ";
        const text = m.content || "";
        if (text) transcript += name + ": " + text + "\n";
      }
    }
    if (!transcript.trim()) return "";
    const systemInstruction = charType === "plain" ? MEMORY_SYSTEM_PLAIN : MEMORY_SYSTEM_LOVER;
    console.log("[MEMORY] Generating inherited memory (" + charType + ") from " + sourceConvs.length + " thread(s)...");
    return callHaikuSummary(
      "以下の会話を記憶として書き留めてください:\n\n" + transcript,
      systemInstruction,
      apiKey, 1500
    );
  }

  // ── thinking剥がしヘルパー ──
  // ※最新assistantの温存はキャッシュを壊すため廃止。
  //   Web検索・画像ターンのみ構造を温存（API互換性のため）。
  function shouldPreserveApiContent(m, idx, allMsgs) {
    if (!m.apiContent) return false;
    // 1. Web検索ターン: server_tool_use / web_search_tool_result を含む
    const hasWebSearch = m.apiContent.some(b => b.type === "server_tool_use" || b.type === "web_search_tool_result");
    if (hasWebSearch) return true;
    // 2. 画像ターン: 直前のuserに画像がある、またはassistant自身が画像ブロックを持つ
    const prevUser = idx > 0 ? allMsgs[idx - 1] : null;
    if (prevUser && prevUser.role === "user" && prevUser.images?.length > 0) return true;
    if (m.apiContent.some(b => b.type === "image")) return true;
    return false;
  }

  function stripThinkingFromContent(apiContent, fallbackText) {
    const stripped = apiContent.filter(b => b.type !== "thinking");
    if (stripped.length === 0) return fallbackText || "…";
    return stripped;
  }

  // ── 表示用thinkingの正規化（tool_use往復で複数セグメントになる場合は配列のまま保持）──
  // 文字列（旧形式）はそのまま、配列は中身が全部空ならnullにする
  function normalizeThinkingForDisplay(streamThinking) {
    if (Array.isArray(streamThinking)) {
      const hasAny = streamThinking.some(s => s && s.trim());
      return hasAny ? streamThinking : null;
    }
    return streamThinking || null;
  }

  // ── thinking（文字列 or 配列）をプレーンテキストに変換（エクスポート用）──
  function thinkingToPlainText(thinking) {
    if (Array.isArray(thinking)) return thinking.filter(s => s && s.trim()).join("\n\n──\n\n");
    return thinking || "";
  }

  // ── contentブロックからcache_controlを除去（保存済みデータへの残存を防ぐ）──
  function stripCacheControl(msg) {
    if (!Array.isArray(msg.content)) return msg;
    return { ...msg, content: msg.content.map(b => {
      if (!b || typeof b !== "object" || !("cache_control" in b)) return b;
      const { cache_control, ...rest } = b;
      return rest;
    }) };
  }

  // ── 直近メッセージの最後のcontentブロックにephemeralキャッシュを付与 ──
  function markEphemeral(msg) {
    if (typeof msg.content === "string") {
      return { ...msg, content:[{ type:"text", text:msg.content, cache_control:{ type:"ephemeral" } }] };
    }
    if (Array.isArray(msg.content)) {
      const blocks = [...msg.content];
      blocks[blocks.length-1] = { ...blocks[blocks.length-1], cache_control:{ type:"ephemeral" } };
      return { ...msg, content:blocks };
    }
    return msg;
  }

  // ── リクエストボディ内のcache_controlブロックを数える（デバッグ用）──
  function countCacheControlBlocks(reqBody) {
    const hits = [];
    if (reqBody.cache_control) hits.push("body(top-level, invalid location)");
    (reqBody.system || []).forEach((b, i) => { if (b?.cache_control) hits.push("system[" + i + "]"); });
    (reqBody.messages || []).forEach((m, i) => {
      if (Array.isArray(m.content)) {
        m.content.forEach((b, j) => { if (b?.cache_control) hits.push("messages[" + i + "]." + m.role + ".content[" + j + "]"); });
      }
    });
    return hits;
  }

  // ── SSEストリーム読み取り（初回・tool_use継続の両方で共通利用）──
  async function consumeAnthropicStream(res, aTs, requestedModel) {
    let streamText = "";
    let streamThinking = "";
    let modelActual = requestedModel;
    let usageData = {};
    let fullContent = [];
    let stopReason = null;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const jsonStr = line.slice(6).trim();
        if (jsonStr === "[DONE]") continue;
        let event;
        try { event = JSON.parse(jsonStr); } catch { continue; }

        if (event.type === "message_start" && event.message) {
          modelActual = event.message.model || requestedModel;
          if (event.message.usage) {
            usageData = { ...usageData, ...event.message.usage };
            console.log("[CACHE DEBUG] message_start usage:", JSON.stringify(event.message.usage));
          }
        }
        if (event.type === "content_block_start") {
          const blockType = event.content_block?.type || null;
          if (blockType === "thinking") fullContent.push({ type:"thinking", thinking:"", signature:"" });
          if (blockType === "text") fullContent.push({ type:"text", text:"" });
          if (blockType === "server_tool_use") {
            fullContent.push({ ...event.content_block });
            updateConv(c => ({...c, messages:c.messages.map(m =>
              m.timestamp === aTs ? { ...m, content:streamText + (streamText ? "\n" : "") + "🔍 検索中...", _streaming:true, modelActual } : m
            )}));
          }
          if (blockType === "web_search_tool_result") {
            fullContent.push({ ...event.content_block });
          }
          if (blockType === "tool_use") {
            fullContent.push({ ...event.content_block, _inputJson:"" });
            if (event.content_block?.name === "generate_image") {
              updateConv(c => ({...c, messages:c.messages.map(m =>
                m.timestamp === aTs ? { ...m, content:streamText + (streamText ? "\n" : "") + "🎨 描いてる…", _streaming:true, modelActual } : m
              )}));
            }
          }
        }
        if (event.type === "content_block_delta") {
          if (event.delta?.type === "thinking_delta") {
            streamThinking += event.delta.thinking || "";
            if (fullContent.length > 0) {
              const last = fullContent[fullContent.length-1];
              if (last.type === "thinking") last.thinking += event.delta.thinking || "";
            }
          }
          if (event.delta?.type === "signature_delta") {
            if (fullContent.length > 0) {
              const last = fullContent[fullContent.length-1];
              if (last.type === "thinking") last.signature = (last.signature || "") + (event.delta.signature || "");
            }
          }
          if (event.delta?.type === "input_json_delta") {
            if (fullContent.length > 0) {
              const last = fullContent[fullContent.length-1];
              if (last.type === "server_tool_use" || last.type === "tool_use") {
                last._inputJson = (last._inputJson || "") + (event.delta.partial_json || "");
              }
            }
          }
          if (event.delta?.type === "text_delta") {
            streamText += event.delta.text || "";
            if (fullContent.length > 0) {
              const last = fullContent[fullContent.length-1];
              if (last.type === "text") last.text += event.delta.text || "";
            }
            updateConv(c => ({...c, messages:c.messages.map(m =>
              m.timestamp === aTs ? { ...m, content:streamText, thinking:streamThinking||null, modelActual } : m
            )}));
          }
        }
        if (event.type === "content_block_stop") {
          if (fullContent.length > 0) {
            const last = fullContent[fullContent.length-1];
            if ((last.type === "server_tool_use" || last.type === "tool_use") && last._inputJson) {
              try { last.input = JSON.parse(last._inputJson); } catch { last.input = {}; }
              delete last._inputJson;
            }
          }
        }
        if (event.type === "message_delta") {
          if (event.usage) {
            usageData = { ...usageData, ...event.usage };
            console.log("[CACHE DEBUG] message_delta usage:", JSON.stringify(event.usage));
          }
          // stop_reason によるコンテンツフィルタ検出
          const sr = event.delta?.stop_reason;
          if (sr) stopReason = sr;
          if (sr && (sr === "content_filtered" || sr === "safety")) {
            const err = new Error("Content filtered (stop_reason: " + sr + ")");
            err._status = 0;
            err._errData = { error: { message: "content_policy" } };
            throw err;
          }
        }
      }
    }
    return { streamText, streamThinking, fullContent, usage:usageData, modelActual, stopReason };
  }

  async function handleSend() {
    if ((!input.trim() && attachedImages.length === 0) || loading || !settings.apiKey) return;

    // 編集モードで確定 → このタイミングで初めて後続を削除
    if (editingMsg) {
      const editTarget = editingMsg.msg;
      setEditingMsg(null);
      setConversations(prev => prev.map(c => {
        if (c.id !== activeConvId) return c;
        const idx = c.messages.findIndex(m => m.timestamp === editTarget.timestamp);
        if (idx === -1) return c;
        return { ...c, messages: c.messages.slice(0, idx), updatedAt: Date.now() };
      }));
      // messagesが更新される前にsendが走るので、ここで直接取得
      const conv = conversations.find(c => c.id === activeConvId);
      if (conv) {
        const idx = conv.messages.findIndex(m => m.timestamp === editTarget.timestamp);
        if (idx !== -1) {
          // messages変数を上書き（このスコープのみ）
          var truncatedMessages = conv.messages.slice(0, idx);
        }
      }
    }

    const msgImages = attachedImages.map(img => ({ base64: img.base64, type: img.type, preview: img.preview }));
    const userMsg = { role:"user", content:input.trim(), timestamp:Date.now(), charIcon:activeChar.icon, charName:activeChar.name, images:msgImages };
    updateConv(c => ({...c, messages:[...c.messages, userMsg]}));
    setInput(""); setAttachedImages([]); setLoading(true);
    try {
      const baseMsgs = (typeof truncatedMessages !== "undefined") ? truncatedMessages : messages;
      const allMsgs = [...baseMsgs, userMsg];

      // ── 【B】ローリング要約 ──
      let turnCount = 0;
      for (const m of allMsgs) { if (m.role === "user") turnCount++; }
      const hasApiContent = allMsgs.filter(m => m.role === "assistant" && m.apiContent).length;
      console.log("[DEBUG] turnCount=" + turnCount + ", totalMsgs=" + allMsgs.length + ", msgsWithApiContent=" + hasApiContent + ", threshold=" + ROLLING_KEEP_TURNS);

      let summaryText = "";
      let recentMsgs = allMsgs;
      const currentConv = conversations.find(c => c.id === activeConvId);

      if (turnCount > ROLLING_KEEP_TURNS) {
        // 直近N個のuserメッセージの位置を見つけて、そこから保持
        // 理想の分割位置を計算（直近8ターン分のuserから保持）
        let idealKeepFrom = allMsgs.length;
        let userCount = 0;
        for (let i = allMsgs.length - 1; i >= 0; i--) {
          if (allMsgs[i].role === "user") {
            userCount++;
            if (userCount >= ROLLING_KEEP_TURNS) { idealKeepFrom = i; break; }
          }
        }

        const cachedSummaryIdx = currentConv?.summaryUpTo || 0;
        const newUnsummarized = idealKeepFrom - cachedSummaryIdx;
        const REGEN_THRESHOLD = 8; // 8メッセージ（≈4ターン）溜まったら再要約

        if (currentConv?.summary && newUnsummarized < REGEN_THRESHOLD) {
          // ── キャッシュ使い回し ──
          // 要約テキストもsplit位置も固定 → system・メッセージ配列の先頭が安定 → キャッシュヒット
          summaryText = currentConv.summary;
          recentMsgs = allMsgs.slice(cachedSummaryIdx);
          console.log("[SUMMARY] Reusing cached summary + fixed split at " + cachedSummaryIdx + " (unsummarized=" + newUnsummarized + ")");
        } else {
          // ── 初回 or 閾値超え → 再要約 ──
          const oldMsgs = allMsgs.slice(0, idealKeepFrom);
          recentMsgs = allMsgs.slice(idealKeepFrom);
          if (oldMsgs.length > 0) {
            console.log("[SUMMARY] Generating summary for " + oldMsgs.length + " msgs (unsummarized=" + newUnsummarized + ")");
            const newSummary = await generateSummary(oldMsgs, settings.apiKey);
            if (newSummary) {
              summaryText = newSummary;
              updateConv(c => ({ ...c, summary: newSummary, summaryUpTo: idealKeepFrom }));
              console.log("[SUMMARY] Cached new summary (up to index " + idealKeepFrom + ")");
            } else if (currentConv?.summary) {
              summaryText = currentConv.summary;
              recentMsgs = allMsgs.slice(cachedSummaryIdx);
              console.warn("[SUMMARY] Generation failed, falling back to stale cache");
            }
          }
        }
      }

      // ── 【A】apiMsgs構築 + thinking剥がし ──
      const apiMsgs = recentMsgs.flatMap((m, idx) => {
        if (m.role === "assistant" && m.apiMessages) {
          // tool_use（画像生成）ターン: 複数APIメッセージに展開、構造は常に温存
          return m.apiMessages;
        }
        if (m.role === "assistant" && m.apiContent) {
          if (shouldPreserveApiContent(m, idx, recentMsgs)) {
            // 温存: Web検索・画像・最新ターン
            return { role: "assistant", content: m.apiContent };
          } else {
            // thinkingを剥がす
            const stripped = stripThinkingFromContent(m.apiContent, m.content);
            console.log("[THINKING STRIP] Stripped thinking from turn at index " + idx);
            return { role: "assistant", content: stripped };
          }
        }
        if (m.role === "user" && m._directImageGen) {
          return { role:"user", content:"（画像を直接生成: " + (m._rawPrompt||"").slice(0,30) + "）" };
        }
        if (m.role === "assistant" && m._directImageGen) {
          return { role:"assistant", content:"（画像を見せた）" };
        }
        if (m.role==="user" && m.images?.length > 0) {
          const blocks = [];
          m.images.forEach(img => {
            if (img.base64) blocks.push({ type:"image", source:{ type:"base64", media_type:img.type||"image/jpeg", data:img.base64 } });
          });
          if (m.content) blocks.push({ type:"text", text:m.content });
          else if (blocks.length === 0) return { role:m.role, content:m.content || "（画像）" };
          return { role:"user", content:blocks };
        }
        return { role:m.role, content:m.content || "…" };
      }).map(stripCacheControl);

      const isHighEffort = ["xhigh","max"].includes(settings.effort);
      const isTopOpus = ["claude-opus-4-7","claude-opus-4-8","claude-fable-5"].includes(settings.model);
      const isLegacyThinking = ["claude-opus-4-5-20251101","claude-sonnet-4-5-20250929"].includes(settings.model);
      const maxTok = (isTopOpus && settings.thinkingEnabled && isHighEffort) ? 64000
                   : (isLegacyThinking && settings.thinkingEnabled) ? 32000
                   : 16000;
      let effort = settings.effort;
      if (effort === "xhigh" && !isTopOpus) effort = "max";

      // ── systemBlocks構築（2ブロック化）──
      // ブロック1（安定）: キャラprompt + userProfile → キャッシュ長持ち
      const systemBlocks = [
        { type:"text", text: activeChar.prompt + "\n\n" + userProfile, cache_control:{ type:"ephemeral" } }
      ];

      // ブロック2（変動）: 引き継ぎ記憶 + ローリング要約
      const currentConvForMemory = conversations.find(c => c.id === activeConvId);
      const inheritedMemory = currentConvForMemory?.inheritedMemory || "";
      let block2Parts = [];
      if (inheritedMemory) block2Parts.push("## 前回までの記憶\n" + inheritedMemory);
      if (summaryText) block2Parts.push("## これまでのあらすじ\n" + summaryText);
      if (block2Parts.length > 0) {
        systemBlocks.push({ type:"text", text: block2Parts.join("\n\n"), cache_control:{ type:"ephemeral" } });
      }
      if (apiMsgs.length > 1) {
        const lastHistoryIdx = apiMsgs.length - 2;
        apiMsgs[lastHistoryIdx] = markEphemeral(apiMsgs[lastHistoryIdx]);
      }
      const body = { model:settings.model, max_tokens:maxTok, system:systemBlocks, messages:apiMsgs, stream:true };
      if (settings.thinkingEnabled) {
        const manualOnly = ["claude-opus-4-5-20251101","claude-sonnet-4-5-20250929"].includes(settings.model);
        const supportsManual = ["claude-opus-4-6","claude-sonnet-4-6"].includes(settings.model);
        if (manualOnly || (effort === "high" && supportsManual)) {
          body.thinking = { type:"enabled", budget_tokens:15000 };
        } else {
          body.thinking = { type:"adaptive", display:"summarized" };
          body.output_config = { effort };
        }
      }
      const imageGenActive = settings.imageGenEnabled && settings.openaiApiKey;
      const tools = [];
      if (settings.webSearch) tools.push({ type:"web_search_20250305", name:"web_search", max_uses: 3 });
      if (imageGenActive) tools.push(GENERATE_IMAGE_TOOL);
      if (tools.length > 0) body.tools = tools;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":settings.apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true", "anthropic-beta":"interleaved-thinking-2025-05-14" },
        body:JSON.stringify(body),
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        const err = new Error(errData.error?.message || "API error " + res.status);
        err._status = res.status;
        err._errData = errData;
        throw err;
      }

      const aTs = Date.now();
      const placeholderMsg = { role:"assistant", content:"", thinking:null, thinkingRequested:settings.thinkingEnabled, timestamp:aTs, charIcon:activeChar.icon, charName:activeChar.name, modelRequested:settings.model, modelActual:settings.model, _streaming:true };
      updateConv(c => ({...c, messages:[...c.messages, userMsg, placeholderMsg].filter((m,i,arr) => i===arr.findIndex(x => x.timestamp===m.timestamp))}));

      let result = await consumeAnthropicStream(res, aTs, settings.model);

      // ── tool_use（generate_image）継続フロー ──
      let apiMessagesForStorage = null;
      if (imageGenActive && result.stopReason === "tool_use") {
        const toolBlock = result.fullContent.find(b => b.type === "tool_use" && b.name === "generate_image");
        if (toolBlock) {
          const imgPrompt = toolBlock.input?.prompt || "";
          let toolResultContent, isError = false, generatedImages = null;
          try {
            const imgResult = await callOpenAIImage(imgPrompt, settings.openaiApiKey, settings.imageModel);
            if (imgResult.base64) {
              const shrunk = await shrinkBase64Image(imgResult.base64, 512, 0.8);
              toolResultContent = [
                { type:"text", text:"画像を生成しました。" },
                { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:shrunk.base64 } },
              ];
              generatedImages = [{ preview:shrunk.preview, fullBase64:imgResult.base64, url:null }];
            } else if (imgResult.url) {
              toolResultContent = [
                { type:"text", text:"画像を生成しました。" },
                { type:"image", source:{ type:"url", url:imgResult.url } },
              ];
              generatedImages = [{ preview:null, fullBase64:null, url:imgResult.url }];
            } else {
              throw new Error("OpenAI returned no image data");
            }
          } catch (imgErr) {
            console.error("[IMAGE GEN]", imgErr);
            isError = true;
            toolResultContent = [{ type:"text", text:"画像生成に失敗しました: " + (imgErr.message || "unknown error") }];
          }

          const assistantToolUseMsg = { role:"assistant", content:result.fullContent };
          const toolResultMsg = { role:"user", content:[{ type:"tool_result", tool_use_id:toolBlock.id, content:toolResultContent, ...(isError ? { is_error:true } : {}) }] };

          const contBody = { ...body, messages:[...apiMsgs, assistantToolUseMsg, markEphemeral(toolResultMsg)] };
          const ccHits = countCacheControlBlocks(contBody);
          console.log("[CACHE DEBUG] contBody cache_control count=" + ccHits.length, ccHits);
          const res2 = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json", "x-api-key":settings.apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true", "anthropic-beta":"interleaved-thinking-2025-05-14" },
            body:JSON.stringify(contBody),
          });
          if (!res2.ok) {
            const errData = await res2.json().catch(() => ({}));
            const err = new Error(errData.error?.message || "API error " + res2.status);
            err._status = res2.status;
            err._errData = errData;
            throw err;
          }
          const result2 = await consumeAnthropicStream(res2, aTs, settings.model);

          apiMessagesForStorage = [assistantToolUseMsg, toolResultMsg, { role:"assistant", content:result2.fullContent }];
          result = {
            streamText: (result.streamText ? result.streamText + "\n\n" : "") + result2.streamText,
            streamThinking: [result.streamThinking || "", result2.streamThinking || ""],
            fullContent: result2.fullContent,
            usage: result2.usage,
            modelActual: result2.modelActual,
            stopReason: result2.stopReason,
            generatedImages,
          };
        }
      }

      const usage = result.usage;
      const finalMsg = {
        role:"assistant", content:result.streamText || "……ごめん、うまく言葉が出てこない。",
        thinking:normalizeThinkingForDisplay(result.streamThinking), thinkingRequested:settings.thinkingEnabled,
        timestamp:aTs,
        charIcon:activeChar.icon, charName:activeChar.name,
        modelRequested:settings.model, modelActual:result.modelActual,
        usage:{ input:usage.input_tokens||0, output:usage.output_tokens||0, cacheRead:usage.cache_read_input_tokens||0, cacheCreate:usage.cache_creation_input_tokens||0, raw:JSON.stringify(usage) },
        ...(apiMessagesForStorage ? { apiMessages:apiMessagesForStorage } : { apiContent:result.fullContent }),
        ...(result.generatedImages ? { generatedImages:result.generatedImages } : {}),
      };
      updateConv(c => ({...c, messages:c.messages.map(m => m.timestamp === aTs ? finalMsg : m)}));
    } catch(err) {
      const errorType = classifyError(err);
      const charMsg = getCharErrorMessage(activeCharId, errorType, err.message, err._status);
      console.error("[ERROR] type=" + errorType + " status=" + (err._status||"N/A") + " raw=" + err.message);
      const eMsg = { role:"assistant", content: charMsg, timestamp:Date.now(), charIcon:activeChar.icon, charName:activeChar.name, errorType };
      updateConv(c => ({...c, messages:[...c.messages, eMsg]}));
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 100);
  }

  // ── 🎨 直接発注（Claudeを介さず、入力テキストをそのままOpenAIに発注）──
  async function handleDirectImageGen() {
    if (!input.trim() || loading || !settings.openaiApiKey) return;
    const promptText = input.trim();
    setInput("");
    const userMsg = { role:"user", content:"🎨 " + promptText, timestamp:Date.now(), charIcon:activeChar.icon, charName:activeChar.name, _directImageGen:true, _rawPrompt:promptText };
    const aTs = Date.now() + 1;
    const placeholderMsg = { role:"assistant", content:"🎨 描いてる…", timestamp:aTs, charIcon:activeChar.icon, charName:activeChar.name, _streaming:true, _directImageGen:true };
    updateConv(c => ({...c, messages:[...c.messages, userMsg, placeholderMsg]}));
    setLoading(true);
    try {
      const imgResult = await callOpenAIImage(promptText, settings.openaiApiKey, settings.imageModel);
      let generatedImages;
      if (imgResult.base64) {
        const shrunk = await shrinkBase64Image(imgResult.base64, 512, 0.8);
        generatedImages = [{ preview:shrunk.preview, fullBase64:imgResult.base64, url:null }];
      } else if (imgResult.url) {
        generatedImages = [{ preview:null, fullBase64:null, url:imgResult.url }];
      } else {
        throw new Error("OpenAI returned no image data");
      }
      const finalMsg = { role:"assistant", content:"", generatedImages, timestamp:aTs, charIcon:activeChar.icon, charName:activeChar.name, _directImageGen:true };
      updateConv(c => ({...c, messages:c.messages.map(m => m.timestamp===aTs ? finalMsg : m)}));
    } catch (err) {
      err._provider = err._provider || "openai";
      const errorType = classifyError(err);
      const charMsg = getCharErrorMessage(activeCharId, errorType, err.message, err._status);
      const eMsg = { role:"assistant", content:charMsg, timestamp:aTs, charIcon:activeChar.icon, charName:activeChar.name, errorType };
      updateConv(c => ({...c, messages:c.messages.map(m => m.timestamp===aTs ? eMsg : m)}));
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 100);
  }

  // ── テスト用: window.testError('credit') 等で任意のエラー表示を確認 ──
  useEffect(() => {
    window.testError = (errorType) => {
      const validTypes = ["network","timeout","rate_limit","credit","server","auth","content_filter","context_length","image_gen","fallback"];
      if (!validTypes.includes(errorType)) {
        console.warn("[TEST] Unknown type: " + errorType + ". Valid: " + validTypes.join(", "));
        return;
      }
      const charMsg = getCharErrorMessage(activeCharId, errorType);
      console.log("[TEST] Simulating error type=" + errorType + " for char=" + activeCharId);
      const eMsg = { role:"assistant", content: charMsg, timestamp:Date.now(), charIcon:activeChar.icon, charName:activeChar.name, errorType };
      setConversations(prev => prev.map(c => c.id === activeConvId ? { ...c, messages: [...c.messages, eMsg], updatedAt: Date.now() } : c));
    };
    return () => { delete window.testError; };
  }, [activeCharId, activeConvId, activeChar]);

  function handleEdit(msg) {
    // 編集モードに入るだけ。まだ削除しない
    setEditingMsg({ msg, prevInput: input });
    setInput(msg.content || "");
    setTimeout(() => inputRef.current?.focus(), 100);
  }

  function cancelEdit() {
    if (!editingMsg) return;
    setInput(editingMsg.prevInput || "");
    setEditingMsg(null);
  }

  function saveMemoryEdit() {
    const text = memoryDraft;
    setConversations(prev => prev.map(c =>
      c.id === activeConvId ? { ...c, inheritedMemory: text, memoryEdited: true, updatedAt: Date.now() } : c
    ));
    setEditingMemory(false);
  }
  function cancelMemoryEdit() {
    setEditingMemory(false);
    setMemoryDraft("");
  }

  async function handleExport(convId) {
    const conv = conversations.find(c => c.id === convId);
    if (!conv || !conv.messages?.length) return;
    const charName = conv.charName || conv.charIcon || "会話";
    const date = new Date(conv.createdAt).toLocaleDateString("ja-JP");
    const fileName = charName + "_" + date.split("/").join("-") + ".txt";
    let text = charName + "との会話 — " + date + "\n========================================\n\n";
    conv.messages.forEach(function(m) {
      const time = new Date(m.timestamp).toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
      const name = m.role === "user" ? "多恵子" : (m.charIcon||"") + " " + (m.charName||"");
      const model = m.modelActual ? " [" + m.modelActual.replace("claude-","") + "]" : "";
      text += "[" + time + "] " + name.trim() + model + "\n" + m.content + "\n";
      const thinkingText = thinkingToPlainText(m.thinking);
      if (thinkingText) text += "\n  💭 Thinking:\n  " + thinkingText.split("\n").join("\n  ") + "\n";
      text += "\n";
    });
    const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
    const blob = new Blob([bom, text], { type:"text/plain;charset=utf-8" });
    const file = new File([blob], fileName, { type:"text/plain;charset=utf-8" });

    // Web Share API（スマホの共有メニュー）を試す → ダメならダウンロード
    if (navigator.share) {
      try {
        await navigator.share({ title: charName + "との会話", files: [file] });
        return;
      } catch (err) {
        if (err.name === "AbortError") return; // ユーザーがキャンセルした
        // 共有失敗時はダウンロードにフォールバック
      }
    }

    // フォールバック：従来のダウンロード
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleKeyDown(e) { if (e.key==="Enter" && (e.ctrlKey||e.metaKey)) { e.preventDefault(); handleSend(); } }

  // ── バックアップ（全データJSON書き出し）──
  async function handleBackup() {
    const data = {};
    Object.values(SK).forEach(key => {
      const val = sGet(key);
      if (val !== null) data[key] = val;
    });
    const dateStr = new Date().toISOString().slice(0, 10);
    const fileName = "nagichat-backup-" + dateStr + ".json";
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const file = new File([blob], fileName, { type: "application/json" });
    if (navigator.share) {
      try { await navigator.share({ title: "ナギChat バックアップ", files: [file] }); return; }
      catch (err) { if (err.name === "AbortError") return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  // ── 復元（JSON読み込み）──
  const [restoreConfirm, setRestoreConfirm] = useState(null);
  const [editingMsg, setEditingMsg] = useState(null); // { msg, prevInput }


  function handleRestore(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data || typeof data !== "object") throw new Error("Invalid format");
        setRestoreConfirm(data);
      } catch {
        alert("ファイルを読み込めませんでした。JSONファイルか確認してください。");
      }
    };
    reader.readAsText(file);
  }

  function confirmRestore() {
    const data = restoreConfirm;
    setRestoreConfirm(null);
    try {
      Object.values(SK).forEach(key => {
        if (data[key] !== undefined) sSet(key, data[key]);
        else localStorage.removeItem(key);
      });
      // 状態を再読み込み
      if (data[SK.settings]) setSettings(prev => ({ ...prev, ...data[SK.settings] }));
      if (data[SK.convos]) {
        setConversations(data[SK.convos]);
        const first = data[SK.convos][0];
        if (first) { setActiveConvId(first.id); setActiveCharId(first.charId || "nagi"); }
      }
      if (data[SK.chars]?.length > 0) {
        const merged = DEFAULT_CHARS.map(def => { const saved = data[SK.chars].find(s => s.id === def.id); return saved ? { ...def, prompt: saved.prompt } : def; });
        setCharacters(merged);
      }
      if (data[SK.profile]) setUserProfile(data[SK.profile]);
      setShowSettings(false);
      console.log("[BACKUP] Restored successfully");
    } catch (err) {
      alert("復元中にエラーが発生しました: " + err.message);
    }
  }

  const hasInput = input.trim() || attachedImages.length > 0;

  if (screen === "top") return <TopPage characters={characters} onSelect={id => handleSwitchChar(id, true)} />;

  return (
    <div style={{ height:"100vh",width:"100vw",display:"flex",flexDirection:"column",background:theme.bg,color:"#e4e4e7",fontFamily:FONT,position:"relative",overflow:"hidden",transition:"background 0.5s ease" }}>
      <Sidebar conversations={charConvos} activeId={activeConvId} activeChar={activeChar} onSelect={setActiveConvId} onNew={handleNewConv} onDelete={handleDeleteConv} onExport={handleExport} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} theme={theme} />

      {showSettings && <SettingsPanel settings={settings} onSave={s => { setSettings(s); sSet(SK.settings,s); setShowSettings(false); }} onClose={() => settings.apiKey ? setShowSettings(false) : null} theme={theme} onBackup={handleBackup} onRestore={handleRestore} />}
      {restoreConfirm && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,animation:"fadeIn 0.15s ease-out" }}>
          <div style={{ background:"#1c1c22",borderRadius:"24px",padding:"28px 24px",width:"min(340px, 85vw)",border:`1px solid ${theme.accent}20`,boxShadow:`0 20px 60px rgba(0,0,0,0.5)`,textAlign:"center" }}>
            <div style={{ fontSize:"32px",marginBottom:"14px" }}>📥</div>
            <div style={{ fontSize:"15px",color:"#e4e4e7",fontFamily:FONT,fontWeight:700,marginBottom:"8px" }}>データを復元する？</div>
            <div style={{ fontSize:"12px",color:"#71717a",fontFamily:FONT,marginBottom:"22px",lineHeight:"1.6" }}>現在のデータは上書きされます</div>
            <div style={{ display:"flex",gap:"10px" }}>
              <button onClick={() => setRestoreConfirm(null)} style={{ flex:1,padding:"11px",borderRadius:"14px",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"#a1a1aa",fontSize:"13px",cursor:"pointer",fontFamily:FONT,fontWeight:500 }}>やめる</button>
              <button onClick={confirmRestore} style={{ flex:1,padding:"11px",borderRadius:"14px",border:"none",background:theme.userGradient,color:"#fff",fontSize:"13px",cursor:"pointer",fontFamily:FONT,fontWeight:600,boxShadow:`0 3px 12px ${theme.userShadow}` }}>復元する</button>
            </div>
          </div>
        </div>
      )}
      {showPromptEditor && <PromptEditor prompt={activeChar.prompt} charName={activeChar.name} charIcon={activeChar.icon} charAvatar={activeChar.avatar} onSave={p => { setCharacters(prev => prev.map(c => c.id===activeCharId?{...c,prompt:p}:c)); setShowPromptEditor(false); }} onClose={() => setShowPromptEditor(false)} theme={theme} />}
      {showProfileEditor && <PromptEditor prompt={userProfile} charName="共通プロフィール" charIcon="👤" onSave={p => { setUserProfile(p); setShowProfileEditor(false); }} onClose={() => setShowProfileEditor(false)} theme={theme} />}
      {deleteConfirmId && <DeleteConfirmDialog onConfirm={confirmDelete} onCancel={() => setDeleteConfirmId(null)} theme={theme} />}

      {/* Memory Viewer Modal */}
      {showMemory && (() => {
        const mem = activeConv?.inheritedMemory;
        const closeMemory = () => { setShowMemory(false); setEditingMemory(false); };
        return (
          <div style={overlayStyle} onClick={closeMemory}>
            <div onClick={e => e.stopPropagation()} style={{ background:"#1a1a22",borderRadius:"24px",padding:"24px",width:"min(480px, 92vw)",maxHeight:"80vh",display:"flex",flexDirection:"column",border:`1px solid ${theme.accent}20`,boxShadow:`0 20px 60px rgba(0,0,0,0.6), 0 0 30px ${theme.accent}10` }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px" }}>
                <div style={{ display:"flex",alignItems:"center",gap:"8px" }}>
                  <span style={{ fontSize:"18px" }}>🧠</span>
                  <span style={{ fontSize:"15px",fontWeight:700,color:theme.accent,fontFamily:FONT }}>前回までの記憶</span>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:"6px" }}>
                  {mem && !editingMemory && (
                    <button onClick={() => { setMemoryDraft(mem); setEditingMemory(true); }} style={{ background:"none",border:`1px solid ${theme.accent}30`,borderRadius:"10px",color:theme.accent,fontSize:"12px",cursor:"pointer",padding:"4px 10px",fontFamily:FONT,transition:"all 0.2s",display:"flex",alignItems:"center",gap:"5px" }}>
                      <PenIcon color={theme.accent} size={12} /> 編集
                    </button>
                  )}
                  <button onClick={closeMemory} style={closeBtnStyle}
                    onMouseEnter={e => e.currentTarget.querySelector('svg').style.stroke = theme.accent} onMouseLeave={e => e.currentTarget.querySelector('svg').style.stroke = `${theme.accent}66`}>
                    <XIcon color={`${theme.accent}66`} size={18} />
                  </button>
                </div>
              </div>
              <div style={{ fontSize:"11px",color:"#52525b",fontFamily:FONT,marginBottom:"12px" }}>
                {activeChar.name}がこのスレッドに引き継いだ記憶
              </div>
              <div onClick={() => setConversations(prev => prev.map(c => c.id === activeConvId ? { ...c, skipMemory: !c.skipMemory, updatedAt: Date.now() } : c))}
                style={{ display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",borderRadius:"12px",background: activeConv?.skipMemory ? "rgba(250,204,21,0.06)" : "rgba(255,255,255,0.03)",border:`1px solid ${activeConv?.skipMemory ? "rgba(250,204,21,0.25)" : "rgba(255,255,255,0.06)"}`,cursor:"pointer",marginBottom:"14px",transition:"all 0.2s" }}>
                <div style={{ width:"42px",height:"24px",borderRadius:"12px",background: activeConv?.skipMemory ? "linear-gradient(135deg, #eab308, #facc15)" : "rgba(255,255,255,0.08)",position:"relative",flexShrink:0 }}>
                  <div style={{ width:"20px",height:"20px",borderRadius:"50%",background:"#fff",position:"absolute",top:"2px",left: activeConv?.skipMemory ? "20px" : "2px",transition:"left 0.3s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)" }}/>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"13px",color: activeConv?.skipMemory ? "#facc15" : "#d4d4d8",fontFamily:FONT,fontWeight:600 }}>
                    🧪 {activeConv?.skipMemory ? "実験スレ — 次に引き継がない" : "通常スレ — 次に引き継ぐ"}
                  </div>
                  <div style={{ fontSize:"10px",color:"#71717a",fontFamily:FONT,marginTop:"2px",lineHeight:"1.5" }}>
                    ONで、このスレは要約されず、ひとつ前の記憶がそのまま次へ進みます
                  </div>
                </div>
              </div>
              {editingMemory ? (
                <>
                  <textarea value={memoryDraft} onChange={e => setMemoryDraft(e.target.value)} style={{ flex:1,width:"100%",padding:"16px",borderRadius:"16px",border:`1px solid ${theme.accent}15`,background:"rgba(255,255,255,0.03)",color:"#d4d4d8",fontSize:"13px",lineHeight:"1.8",fontFamily:FONT,outline:"none",resize:"none",boxSizing:"border-box",minHeight:"200px" }} />
                  <div style={{ fontSize:"10px",color:"#3f3f46",marginTop:"6px",textAlign:"right",fontFamily:FONT }}>{memoryDraft.length.toLocaleString()} 文字</div>
                  <div style={{ display:"flex",gap:"8px",marginTop:"10px" }}>
                    <button onClick={cancelMemoryEdit} style={{ flex:1,padding:"11px",borderRadius:"14px",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"#71717a",fontSize:"13px",cursor:"pointer",fontFamily:FONT }}>キャンセル</button>
                    <button onClick={saveMemoryEdit} style={{ flex:1,padding:"11px",borderRadius:"14px",border:"none",background:theme.userGradient,color:"#fff",fontSize:"13px",cursor:"pointer",fontWeight:600,fontFamily:FONT }}>保存</button>
                  </div>
                </>
              ) : (
                <div style={{ flex:1,overflowY:"auto",padding:"16px",borderRadius:"16px",background:`${theme.accent}06`,border:`1px solid ${theme.accent}12`,fontSize:"13px",lineHeight:"2",color:"#d4d4d8",fontFamily:FONT,whiteSpace:"pre-wrap",wordBreak:"break-word" }}>
                  {mem || "（このスレッドに引き継ぎ記憶はありません）"}
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Header */}
      <div style={{ padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${theme.accent}10`,background:theme.headerBg,backdropFilter:"blur(16px)",flexShrink:0 }}>
        <div style={{ display:"flex",alignItems:"center",gap:"12px" }}>
          <button onClick={() => setSidebarOpen(true)} style={{ background:"none",border:"none",cursor:"pointer",padding:"3px",display:"flex",alignItems:"center" }}
            onMouseEnter={iconBtnHover} onMouseLeave={iconBtnLeave}>
            <HamburgerIcon color={`${theme.accent}66`} size={20} />
          </button>
          <div>
            <div style={{ display:"flex",alignItems:"center",gap:"10px" }}>
              <CharSwitcher chars={characters} activeId={activeCharId} onSwitch={handleSwitchChar} theme={theme} onBackLongPressStart={startBackLongPress} onBackLongPressEnd={cancelBackLongPress} />
              <span style={{ fontSize:"15px",fontWeight:700,fontFamily:FONT,color:theme.accent }}>{activeChar.name}</span>
            </div>
            <StatusBadges model={settings.model} effort={settings.effort} thinkingEnabled={settings.thinkingEnabled} webSearch={settings.webSearch} />
          </div>
        </div>
        <div style={{ display:"flex",gap:"5px" }}>
          <button onClick={() => setShowMemory(true)} style={{...headerBtnStyle, position:"relative"}} title="前回の記憶"
            onMouseEnter={iconBtnHover} onMouseLeave={iconBtnLeave}>
            <DropletIcon color={`${theme.accent}66`} size={18} />
            {activeConv?.inheritedMemory && <span style={{ position:"absolute",top:"-2px",right:"-2px",width:"7px",height:"7px",borderRadius:"50%",background:theme.accent,boxShadow:`0 0 6px ${theme.accent}80` }}/>}
          </button>
          <button onClick={() => setShowPromptEditor(true)} style={headerBtnStyle} title="プロンプト編集"
            onMouseEnter={iconBtnHover} onMouseLeave={iconBtnLeave}>
            <PenIcon color={`${theme.accent}66`} size={18} />
          </button>
          <button onClick={() => setShowProfileEditor(true)} style={headerBtnStyle} title="プロフィール"
            onMouseEnter={iconBtnHover} onMouseLeave={iconBtnLeave}>
            <PersonIcon color={`${theme.accent}66`} size={18} />
          </button>
          <button onClick={() => setShowSettings(true)} style={headerBtnStyle} title="設定"
            onMouseEnter={iconBtnHover} onMouseLeave={iconBtnLeave}>
            <GearIcon color={`${theme.accent}66`} size={18} />
          </button>
        </div>
      </div>

      {/* Messages */}
      <div ref={chatAreaRef} onScroll={handleChatScroll} style={{ flex:1,overflowY:"auto",padding:"20px 14px",position:"relative" }}>
        {messages.length===0 && (
          <div style={{ textAlign:"center",padding:"60px 20px",animation:"fadeIn 0.4s ease-out" }}>
            <div style={{ marginBottom:"16px" }}><Avatar src={activeChar.avatar} size={72} border={`3px solid ${theme.accent}40`} /></div>
            <div style={{ fontSize:"14px",color:"#52525b",lineHeight:"1.8",fontFamily:FONT }}>{activeChar.name}との会話を始めよう</div>
          </div>
        )}
        {messages.filter(m => !(m._streaming && !m.content)).map((msg, i) => <MessageBubble key={msg.timestamp+"-"+i} msg={msg} theme={theme} charAvatar={activeChar.avatar} onEdit={!loading ? handleEdit : null} />)}
        {loading && !(messages.some(m => m._streaming && m.content)) && <TypingIndicator avatar={activeChar.avatar} name={activeChar.name} theme={theme} />}
        <div ref={endRef} />
      </div>
      {/* Scroll to bottom button */}
      {showScrollBtn && (
        <button onClick={scrollToBottom} style={{
          position:"absolute", bottom:"90px", right:"16px", zIndex:30,
          width:"44px", height:"44px", borderRadius:"50%", border:"none",
          background:theme.userGradient, color:"#fff",
          boxShadow:`0 4px 16px ${theme.userShadow}`,
          cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
          animation:"fadeIn 0.2s ease-out", transition:"all 0.2s",
          fontSize:"18px",
        }}>↓</button>
      )}

      {/* Input Area */}
      <div style={{ padding:"8px 12px max(16px, env(safe-area-inset-bottom))",borderTop:`1px solid ${theme.accent}10`,background:theme.inputBg,backdropFilter:"blur(16px)",flexShrink:0 }}>
        {editingMsg && (
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:"720px",margin:"0 auto 6px",padding:"6px 14px",borderRadius:"12px",background:`${theme.accent}12`,border:`1px solid ${theme.accent}25` }}>
            <span style={{ fontSize:"13px",color:theme.accent }}>✏️ 編集中…</span>
            <button onClick={cancelEdit} style={{ fontSize:"12px",color:"#a1a1aa",background:"none",border:"none",cursor:"pointer",padding:"2px 8px",borderRadius:"8px",transition:"all 0.2s" }}
              onMouseEnter={e => { e.target.style.color = "#e4e4e7"; e.target.style.background = "rgba(255,255,255,0.06)"; }}
              onMouseLeave={e => { e.target.style.color = "#a1a1aa"; e.target.style.background = "none"; }}
            >キャンセル</button>
          </div>
        )}
        {attachedImages.length > 0 && (
          <div style={{ display:"flex",gap:"6px",padding:"6px 4px 8px",overflowX:"auto",maxWidth:"720px",margin:"0 auto" }}>
            {attachedImages.map((img, idx) => (
              <div key={idx} style={{ position:"relative",flexShrink:0 }}>
                <img src={img.preview} style={{ width:"56px",height:"56px",borderRadius:"14px",objectFit:"cover",border:`1px solid ${theme.bubbleBorder}` }} />
                <button onClick={() => removeImage(idx)} style={{ position:"absolute",top:"-4px",right:"-4px",width:"18px",height:"18px",borderRadius:"50%",background:"#27272a",border:"1px solid rgba(255,255,255,0.1)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0 }}
                  onMouseEnter={iconBtnHover} onMouseLeave={iconBtnLeave}>
                  <XIcon color={`${theme.accent}66`} size={10} />
                </button>
              </div>
            ))}
          </div>
        )}
        <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleImageSelect} style={{ display:"none" }} />
        <div style={{ display:"flex",gap:"8px",alignItems:"flex-end",maxWidth:"720px",margin:"0 auto" }}>
          <button onClick={() => fileRef.current?.click()} disabled={loading}
            onMouseEnter={() => setAttachHover(true)} onMouseLeave={() => setAttachHover(false)}
            onFocus={() => setAttachHover(true)} onBlur={() => setAttachHover(false)}
            style={{
              width:"44px",height:"44px",borderRadius:"14px",border:"none",background:`${theme.accent}08`,
              cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",
              flexShrink:0,position:"relative",transition:"all 0.2s",
              boxShadow: attachHover ? `0 0 12px ${theme.accent}50` : "none",
            }}>
            <span style={{ display:"flex",transform: attachedImages.length>0 ? "rotate(45deg)" : "rotate(0deg)",transition:"transform 0.25s" }}>
              <PlusIcon color={theme.accent + (attachHover ? "" : "66")} size={20} />
            </span>
            {attachedImages.length > 0 && (
              <span style={{ position:"absolute",top:"-4px",right:"-4px",minWidth:"16px",height:"16px",padding:"0 3px",borderRadius:"50%",background:theme.userGradient,color:"#fff",fontSize:"9px",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,fontFamily:FONT }}>
                {attachedImages.length}
              </span>
            )}
          </button>
          {settings.imageGenEnabled && settings.openaiApiKey && (
            <button onClick={handleDirectImageGen} disabled={loading || !input.trim()} title="このテキストで直接画像生成"
              style={{
                width:"44px",height:"44px",borderRadius:"14px",border:"none",background:`${theme.accent}08`,
                cursor:(loading||!input.trim())?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                flexShrink:0,fontSize:"20px",opacity:(loading||!input.trim())?0.4:1,transition:"opacity 0.2s",
              }}>🎨</button>
          )}
          <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown}
            placeholder={settings.apiKey ? theme.placeholder : "⚙️ まずAPIキーを設定してね"}
            disabled={!settings.apiKey||loading} rows={1}
            style={{ flex:1,padding:"12px 16px",borderRadius:"18px",border:`1.5px solid ${theme.accent}15`,background:"rgba(255,255,255,0.03)",color:"#e4e4e7",fontSize:"14px",fontFamily:FONT,outline:"none",resize:"none",minHeight:"44px",maxHeight:"110px",lineHeight:"1.5",transition:"border-color 0.3s" }}
            onFocus={e => e.target.style.borderColor = theme.accent + "40"}
            onBlur={e => e.target.style.borderColor = theme.accent + "15"}
          />
          <button onClick={handleSend} disabled={!hasInput||loading||!settings.apiKey}
            style={{
              width:"44px",height:"44px",borderRadius:"50%",border:"none",
              background: hasInput && !loading ? theme.userGradient : `${theme.accent}08`,
              color: hasInput && !loading ? "#fff" : "#3f3f46",
              cursor: hasInput && !loading ? "pointer" : "default",
              display:"flex",alignItems:"center",justifyContent:"center",
              transition:"all 0.25s",flexShrink:0,
              boxShadow: hasInput && !loading ? `0 3px 16px ${theme.userShadow}` : "none",
              animation: hasInput && !loading ? "heartBeat 1.5s ease-in-out infinite" : "none",
            }}>
            <HeartIcon color={hasInput && !loading ? "#fff" : "#52525b"} size={20} />
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<NagiChat />);
</script>
</body>
</html>
